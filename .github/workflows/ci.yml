name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      non_markdown: ${{ steps.filter.outputs.non_markdown }}
      docs_content: ${{ steps.docs_filter.outputs.docs_content }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Detect non-markdown changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          predicate-quantifier: every
          filters: |
            non_markdown:
              - '**'
              - '!**/*.md'

      - name: Detect documentation content changes
        id: docs_filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs_content:
              - 'docs/**'
              - 'mkdocs.yml'
              - 'scripts/gen_ref_pages.py'
              - 'lib/**'
              - 'models/**'
              - 'README.md'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install workspace dependencies
        run: |
          # Install every uv workspace member for CI checks. Member extras are
          # intentionally omitted; test suites are expected to run without them.
          # The docs group is included because generated documentation helpers
          # are typechecked with the rest of the repository.
          uv sync --all-packages --group docs

      - name: Run pre-commit
        env:
          # uv-lock is intentionally skipped in CI. The local development
          # environment writes uv global exclude-newer options into uv.lock,
          # so lock checks/resolution are handled by the local pre-commit hook.
          SKIP: uv-lock
        run: uv run pre-commit run --all-files

  typecheck:
    name: Typecheck
    needs: changes
    if: needs.changes.outputs.non_markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install workspace dependencies
        run: |
          # Install every uv workspace member for CI checks. Member extras are
          # intentionally omitted; test suites are expected to run without them.
          # The docs group is included because generated documentation helpers
          # are typechecked with the rest of the repository.
          uv sync --all-packages --group docs

      - name: Run ty
        run: uv run ty check lib models

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.non_markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install workspace dependencies
        run: |
          # Install every uv workspace member for CI checks. Member extras are
          # intentionally omitted; test suites are expected to run without them.
          uv sync --all-packages

      - name: Run root tests
        env:
          ROOT_COVERAGE_FAIL_UNDER: "90"
        run: |
          uv run pytest -m "not integration" \
            --import-mode=importlib \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under="${ROOT_COVERAGE_FAIL_UNDER}"

      - name: Run workspace member tests
        shell: bash
        env:
          WORKSPACE_COVERAGE_FAIL_UNDER: "90"
        run: |
          set -euo pipefail

          for parent in lib models; do
            if [ -d "${parent}" ]; then
              find "${parent}" -mindepth 2 -maxdepth 2 -name pyproject.toml -print
            fi
          done |
            sort |
            while IFS= read -r pyproject_file; do
              member_dir="${pyproject_file%/pyproject.toml}"
              tests_dir="${member_dir}/tests"

              if [ ! -d "${tests_dir}" ]; then
                continue
              fi

              package_name="$(
                PYPROJECT_FILE="${pyproject_file}" uv run python -c \
                  'import os, tomllib; print(tomllib.load(open(os.environ["PYPROJECT_FILE"], "rb"))["project"]["name"])'
              )"

              import_package="$(
                MEMBER_DIR="${member_dir}" uv run python -c \
                  'import os, pathlib; src = pathlib.Path(os.environ["MEMBER_DIR"]) / "src"; print(sorted(path.name for path in src.iterdir() if path.is_dir() and (path / "__init__.py").exists())[0])'
              )"

              fail_under="$(
                PYPROJECT_FILE="${pyproject_file}" \
                DEFAULT_FAIL_UNDER="${WORKSPACE_COVERAGE_FAIL_UNDER}" \
                uv run python -c \
                  'import os, sys, tomllib; path = os.environ["PYPROJECT_FILE"]; data = tomllib.load(open(path, "rb")); floor = float(os.environ["DEFAULT_FAIL_UNDER"]); value = float(data.get("tool", {}).get("coverage", {}).get("report", {}).get("fail_under", floor)); sys.exit("coverage fail_under for {} is {:g}, below required floor {:g}".format(path, value, floor)) if value < floor else print("{:g}".format(value))'
              )"

              uv run --package "${package_name}" pytest "${tests_dir}" -m "not vendor_parity and not integration" \
                --cov="${import_package}" \
                --cov-report=term-missing \
                --cov-fail-under="${fail_under}"
            done

  docs:
    name: Documentation
    needs: changes
    if: needs.changes.outputs.docs_content == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install documentation dependencies
        run: uv sync --all-packages --group docs

      - name: Build documentation
        run: |
          uv run --group docs python scripts/gen_ref_pages.py
          uv run --group docs zensical build --strict -f mkdocs.generated.yml

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  pages:
    name: Deploy Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.docs_content == 'true'
    needs:
      - changes
      - docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
