name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

jobs:
  pr-metadata:
    name: PR Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        if: github.event_name == 'pull_request'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check issue reference
        if: github.event_name == 'pull_request'
        run: python scripts/check_pr_issue_reference.py

      - name: Skip issue reference outside pull requests
        if: github.event_name != 'pull_request'
        run: echo "PR metadata checks are only required for pull_request events."

  changes:
    name: Changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      non_markdown: ${{ github.event_name == 'merge_group' && 'true' || steps.filter.outputs.non_markdown }}
      docs_content: ${{ github.event_name == 'merge_group' && 'true' || steps.docs_filter.outputs.docs_content }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Detect non-markdown changes
        id: filter
        if: github.event_name != 'merge_group'
        uses: dorny/paths-filter@v3
        with:
          predicate-quantifier: every
          filters: |
            non_markdown:
              - '**'
              - '!**/*.md'

      - name: Detect documentation content changes
        id: docs_filter
        if: github.event_name != 'merge_group'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs_content:
              - 'docs/**'
              - 'mkdocs.yml'
              - 'scripts/gen_ref_pages.py'
              - 'lib/**'
              - 'models/**'
              - 'README.md'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install workspace dependencies
        run: |
          # Install every uv workspace member for CI checks. Member extras are
          # intentionally omitted; test suites are expected to run without them.
          # The docs group is included because generated documentation helpers
          # are typechecked with the rest of the repository.
          uv sync --all-packages --group docs

      - name: Run pre-commit
        env:
          # uv-lock is intentionally skipped in CI. The local development
          # environment writes uv global exclude-newer options into uv.lock,
          # so lock checks/resolution are handled by the local pre-commit hook.
          SKIP: uv-lock
        run: uv run pre-commit run --all-files

  typecheck:
    name: Typecheck
    needs: changes
    if: needs.changes.outputs.non_markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install workspace dependencies
        run: |
          # Install every uv workspace member for CI checks. Member extras are
          # intentionally omitted; test suites are expected to run without them.
          # The docs group is included because generated documentation helpers
          # are typechecked with the rest of the repository.
          uv sync --all-packages --group docs

      - name: Run ty
        run: uv run ty check lib models

  discover-test-members:
    name: Discover Test Members
    needs: changes
    if: needs.changes.outputs.non_markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      members: ${{ steps.members.outputs.members }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: List workspace members with tests
        id: members
        run: echo "members=$(scripts/list_test_members.sh)" >> "${GITHUB_OUTPUT}"

  test-root:
    name: Test (root)
    needs: changes
    if: needs.changes.outputs.non_markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install workspace dependencies
        run: |
          # Install every uv workspace member for CI checks. Member extras are
          # intentionally omitted; test suites are expected to run without them.
          uv sync --all-packages

      - name: Run root tests
        run: uv run pytest tests -m "not integration" --import-mode=importlib

  test-member:
    name: Test (member)
    needs:
      - changes
      - discover-test-members
    if: needs.changes.outputs.non_markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        member: ${{ fromJson(needs.discover-test-members.outputs.members) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install workspace member dependencies
        run: uv sync --package "${{ matrix.member.package }}"

      - name: Run workspace member tests
        env:
          MEMBER_TEST_COVERAGE_JSON_DIR: coverage-artifacts
          WORKSPACE_COVERAGE_FAIL_UNDER: "90"
        run: scripts/run_member_tests.sh "${{ matrix.member.dir }}"

      - name: Upload member coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.member.package }}
          path: coverage-artifacts/*.json
          if-no-files-found: error

  coverage_badge:
    name: Coverage Badge
    needs:
      - changes
      - test-member
    if: needs.changes.outputs.non_markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download member coverage
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-input
          merge-multiple: true

      - name: Build Shields coverage endpoint
        run: python scripts/aggregate_member_coverage.py coverage-input coverage-output

      - name: Upload coverage badge endpoint
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage-output/*.json
          if-no-files-found: error

  test:
    name: Test
    needs:
      - changes
      - test-root
      - test-member
    if: always() && needs.changes.outputs.non_markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-root.result }}" != "success" ]; then
            echo "Test (root) result: ${{ needs.test-root.result }}" >&2
            exit 1
          fi

          if [ "${{ needs.test-member.result }}" != "success" ]; then
            echo "Test (member) result: ${{ needs.test-member.result }}" >&2
            exit 1
          fi

  docs:
    name: Documentation
    needs:
      - changes
      - coverage_badge
    if: always() && needs.changes.outputs.docs_content == 'true' && (needs.coverage_badge.result == 'success' || needs.coverage_badge.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install documentation dependencies
        run: uv sync --all-packages --group docs

      - name: Build documentation
        run: |
          uv run --group docs python scripts/gen_ref_pages.py
          uv run --group docs zensical build --strict -f mkdocs.generated.yml

      - name: Download coverage badge endpoint
        if: needs.coverage_badge.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: coverage-site

      - name: Include generated coverage badge endpoint
        if: needs.coverage_badge.result == 'success'
        run: cp coverage-site/*.json site/

      - name: Preserve existing coverage badge endpoint
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.coverage_badge.result != 'success'
        run: |
          curl -fsSL \
            https://creative-graphic-design.github.io/design-generators/coverage-badge.json \
            -o site/coverage-badge.json || \
          printf '%s\n' '{"schemaVersion":1,"label":"coverage","message":"pending main CI","color":"lightgrey"}' \
            > site/coverage-badge.json

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  pages:
    name: Deploy Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.docs_content == 'true'
    needs:
      - changes
      - docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
