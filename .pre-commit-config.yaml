repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.17
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: pytest-models
        name: pytest models
        entry: bash -c 'env MEMBER_TEST_COVERAGE=0 MEMBER_TEST_RUNNER_DEPS=0 scripts/run_member_tests.sh lib/laygen && printf "%s\n" lib/posgen models/layout-dm models/layoutganpp | xargs -P "${PYTEST_MODELS_JOBS:-3}" -I {} env MEMBER_TEST_COVERAGE=0 MEMBER_TEST_RUNNER_DEPS=0 scripts/run_member_tests.sh "{}"'
        language: system
        pass_filenames: false

      - id: ty
        name: ty
        entry: uv run --package design-generators ty check . --exclude vendor/
        language: system
        pass_filenames: false

      - id: vulture
        name: vulture
        entry: uv run --package design-generators vulture
        language: system
        pass_filenames: false

      - id: duplicate-code
        name: duplicate code
        entry: uv run --package design-generators python scripts/check_duplicate_code.py
        language: system
        pass_filenames: false

      - id: config-defaults
        name: config defaults
        entry: uv run --package design-generators python scripts/check_config_defaults.py
        language: system
        pass_filenames: false

      - id: module-naming
        name: model module naming
        entry: uv run --package design-generators python scripts/check_module_naming.py
        language: system
        pass_filenames: false
