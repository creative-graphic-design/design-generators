repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.17
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: pytest-models
        name: pytest models
        entry: bash -c 'uv run --package layout-generation-common pytest && uv run --package layout-dm pytest && uv run --package const-layout pytest'
        language: system
        pass_filenames: false

      - id: ty
        name: ty
        entry: uv run ty check .
        language: system
        pass_filenames: false

      - id: vulture
        name: vulture
        entry: uv run vulture
        language: system
        pass_filenames: false
