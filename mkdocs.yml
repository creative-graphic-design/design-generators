site_name: design-generators
site_description: Transformers- and Diffusers-style layout and graphic-design generation packages.
site_url: https://creative-graphic-design.github.io/design-generators/
repo_url: https://github.com/creative-graphic-design/design-generators
repo_name: creative-graphic-design/design-generators

theme:
  name: material
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.suggest

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/creative-graphic-design
      name: creative-graphic-design on GitHub
    - icon: fontawesome/brands/hugging-face
      link: https://huggingface.co/creative-graphic-design
      name: creative-graphic-design on Hugging Face
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/cgd_lab
      name: Creative Graphic Design Lab on X

nav:
  - Overview: index.md
  - Conventions: conventions.md
  - API Reference: api/

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - lib/*/src
            - models/*/src
          options:
            docstring_style: google
            members_order: source
            separate_signature: true
            show_signature_annotations: true
