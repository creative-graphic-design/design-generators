[project]
name = "design-generators"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "layout-dm",
    "layout-generation-common",
    "transformers[torch,vision]>=5.0.0",
]

[project.optional-dependencies]
diffusion = [
    "diffusers[torch]>=0.36.0",
]
download = [
    "gdown>=6.1.0",
]
llm-agent = [
    "pydantic-ai>=2.7.0",
]
training = [
    "lightning>=2.0.0",
]

[dependency-groups]
dev = [
    "pre-commit>=4.6.0",
    "pytest>=6.0.0",
    "ruff>=0.1.5",
    "ty>=0.0.10",
]

[tool.uv.workspace]
members = ["models/*"]

[tool.uv.sources]
layout-dm = { workspace = true }
layout-generation-common = { workspace = true }

[tool.pytest.ini_options]
markers = [
    "vendor_parity: requires original LayoutDM weights and vendor dependencies",
]
