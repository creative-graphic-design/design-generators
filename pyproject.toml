[project]
name = "design-generators"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "const-layout",
    "layout-dm",
    "layout-generation-common",
    "transformers[torch,vision]>=5.0.0",
]

[project.optional-dependencies]
diffusion = [
    "diffusers[torch]>=0.36.0",
]
download = [
    "gdown>=6.1.0",
]
llm-agent = [
    "pydantic-ai>=2.7.0",
]
training = [
    "lightning>=2.0.0",
]

[dependency-groups]
dev = [
    "pre-commit>=4.6.0",
    "pytest>=6.0.0",
    "ruff>=0.1.5",
    "ty>=0.0.10",
    "vulture>=2.16",
]

[tool.uv.workspace]
members = ["models/*"]

[tool.uv.sources]
const-layout = { workspace = true }
layout-dm = { workspace = true }
layout-generation-common = { workspace = true }

[tool.ruff.lint]
extend-select = ["ANN", "D"]

[tool.ruff.lint.per-file-ignores]
"scripts/**/*.py" = ["ANN", "D"]
"tests/*.py" = ["D"]
"tests/**/*.py" = ["D"]
"models/*/scripts/**/*.py" = ["ANN", "D"]
"models/*/src/**/*.py" = ["ANN", "D"]
"models/*/tests/**/*.py" = ["ANN", "D"]
"**/tests/**/*.py" = ["ANN", "D"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ty.rules]
all = "error"

[tool.ty.src]
exclude = ["models/common/**", "models/layout-dm/**", "models/const-layout/**"]

[tool.pytest.ini_options]
testpaths = ["tests", "src", "models"]
markers = [
    "integration: tests that require external downloads or heavyweight runtime setup",
    "vendor_parity: requires original weights and vendor dependencies",
]

[tool.vulture]
min_confidence = 70
sort_by_size = true
paths = ["main.py"]
verbose = true
