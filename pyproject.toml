[project]
name = "design-generators"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "layout-dm",
    "laygen",
    "layoutformerpp",
    "transformers[torch,vision]>=5.0.0",
]

[project.optional-dependencies]
diffusion = [
    "diffusers[torch]>=0.36.0",
]
download = [
    "gdown>=6.1.0",
]
llm-agent = [
    "pydantic-ai>=2.7.0",
]
training = [
    "lightning>=2.0.0",
]

[dependency-groups]
dev = [
    "pre-commit>=4.6.0",
    "pytest>=6.0.0",
    "ruff>=0.1.5",
    "ty>=0.0.10",
    "vulture>=2.16",
]

[tool.uv.workspace]
members = ["lib/*", "models/*"]

[tool.uv.sources]
layout-dm = { workspace = true }
laygen = { workspace = true }
layoutformerpp = { workspace = true }
posgen = { workspace = true }

[tool.ruff]
exclude = [
    "vendor",
]

[tool.ruff.lint]
extend-select = ["ANN"]

[tool.ruff.lint.per-file-ignores]
"lib/*/src/**/*.py" = ["D"]
"lib/*/tests/*.py" = ["ANN", "D"]
"lib/*/tests/**/*.py" = ["ANN", "D"]
"models/**/*.py" = ["ANN", "D"]
"models/*/scripts/**/*.py" = ["ANN", "D"]
"models/*/src/**/*.py" = ["D"]
"models/*/tests/*.py" = ["ANN", "D"]
"models/*/tests/**/*.py" = ["ANN", "D"]
"scripts/**/*.py" = ["ANN", "D"]
"tests/*.py" = ["D"]
"tests/**/*.py" = ["D"]

[tool.ty.rules]
all = "error"
missing-override-decorator = "ignore"
unsupported-base = "ignore"
unresolved-import = "ignore"

[tool.ty.src]
exclude = [
    "vendor/**",
    "models/common/**",
    "models/layout-dm/**",
    "models/layoutformerpp/**",
]

[tool.pytest.ini_options]
testpaths = ["tests", "lib", "models"]
markers = [
    "integration: tests that require external downloads or heavyweight runtime setup",
    "vendor_parity: requires original model weights and vendor dependencies",
]

[tool.vulture]
min_confidence = 70
sort_by_size = true
paths = ["main.py", "lib", "models"]
verbose = false
