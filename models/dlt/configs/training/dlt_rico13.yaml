trainer:
  devices: 1
model:
  class_path: dlt.training.lightning_module.DLTTrainingModule
  init_args:
    config:
      class_path: dlt.configuration_dlt.DLTConfig
      init_args:
        dataset_name: rico13
        max_num_comp: 9
        categories_num: 15
    loss_box_weight: 5.0
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 0.0001
    betas: [0.95, 0.999]
    eps: 1.0e-8
    weight_decay: 1.0e-6
data:
  class_path: dlt.training.datamodule.DLTDataModule
  init_args:
    batch_size: 64
    max_num_comp: 9
    categories_num: 15
    shuffle_train: true
