trainer:
  accelerator: cpu
  devices: 1
  max_epochs: 1
  limit_train_batches: 1
  limit_val_batches: 0
  logger: false
  enable_checkpointing: false
  enable_model_summary: false
  default_root_dir: .cache/dlt/smoke
model:
  class_path: dlt.training.lightning_module.DLTTrainingModule
  init_args:
    config:
      class_path: dlt.configuration_dlt.DLTConfig
      init_args:
        dataset_name: publaynet
        max_num_comp: 4
        categories_num: 7
        latent_dim: 32
        num_layers: 1
        num_heads: 4
        cond_emb_size: 12
        cat_emb_size: 8
        num_cont_timesteps: 4
        num_discrete_steps: 2
    loss_box_weight: 5.0
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 0.0001
    betas: [0.95, 0.999]
    eps: 1.0e-8
    weight_decay: 1.0e-6
data:
  class_path: dlt.training.datamodule.DLTDataModule
  init_args:
    batch_size: 2
    length: 4
    max_num_comp: 4
    categories_num: 7
