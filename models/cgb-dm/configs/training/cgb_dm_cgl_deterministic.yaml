model:
  class_path: cgb_dm.training.lightning_module.CGBDMTrainingModule
  init_args:
    config:
      dataset_name: cgl
      num_labels: 5
      max_seq_length: 16
      image_size: [384, 256]
    learning_rate: 0.0002
    gradient_clipping: 1.0
    condition_type: content_image
    seed_mode: deterministic
data:
  class_path: cgb_dm.training.datamodule.CGBDMDataModule
  init_args:
    config:
      dataset_name: cgl
      num_labels: 5
      max_seq_length: 16
      image_size: [384, 256]
    source: original_zip
    data_root: .cache/cgb-dm/datasets/cgl/split
    batch_size: 128
    num_workers: 0
trainer:
  max_epochs: 500
  gradient_clip_val: 1.0
  deterministic: true
