model:
  class_path: cgb_dm.training.lightning_module.CGBDMTrainingModule
  init_args:
    config:
      dataset_name: pku_posterlayout
      num_labels: 4
      max_seq_length: 16
      image_size: [384, 256]
    condition_type: content_image
    seed_mode: deterministic
optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 0.0001
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0.0
    amsgrad: false
lr_scheduler:
  class_path: torch.optim.lr_scheduler.CosineAnnealingLR
  init_args:
    T_max: 500
data:
  class_path: cgb_dm.training.datamodule.CGBDMDataModule
  init_args:
    config:
      dataset_name: pku_posterlayout
      num_labels: 4
      max_seq_length: 16
      image_size: [384, 256]
    source: original_zip
    data_root: .cache/cgb-dm/datasets/pku/split
    batch_size: 32
    num_workers: 0
trainer:
  max_epochs: 500
  gradient_clip_val: 1.0
  deterministic: true
